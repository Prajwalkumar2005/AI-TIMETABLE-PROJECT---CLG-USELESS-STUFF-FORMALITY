<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Scholar Prism | Generate Timetable</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3525cd",
                        "secondary": "#712ae2",
                        "surface": "#f7f9fb",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-surface font-body text-on-surface">
    <!-- Top Navigation -->
    <header class="fixed top-0 w-full z-40 bg-white/60 backdrop-blur-xl shadow-sm border-b">
        <div class="flex items-center justify-between px-6 h-20 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <a href="{{ url_for('dashboard') }}" class="material-symbols-outlined text-indigo-600">arrow_back</a>
                <h1 class="font-headline font-black text-indigo-700 tracking-tighter text-2xl">Scholar Prism</h1>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
            <!-- Form Section -->
            <div class="lg:col-span-12 space-y-8">
                <header class="space-y-4">
                    <h1 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tight text-on-surface leading-[1.1]">
                        Architect Your <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Semester.</span>
                    </h1>
                    <p class="text-on-surface-variant text-lg leading-relaxed max-w-md">
                        Optimized exam flows powered by AI in seconds.
                    </p>
                </header>

                <div class="bg-white p-8 rounded-lg shadow-lg border border-white/40 max-w-2xl">
                    <form class="space-y-6" id="generateForm">
                        <div class="grid grid-cols-1 gap-6">
                            <!-- Department -->
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-indigo-900/70 ml-1">Department</label>
                                <select class="w-full bg-slate-100 border-none rounded-md px-4 py-3 appearance-none focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all" id="department">
                                    <option value="CSE">Computer Science &amp; Engineering</option>
                                    <option value="ME">Mechanical Engineering</option>
                                    <option value="BA">Business Administration</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <!-- Year -->
                                <div class="space-y-2">
                                    <label class="text-sm font-semibold text-indigo-900/70 ml-1">Academic Year</label>
                                    <select class="w-full bg-slate-100 border-none rounded-md px-4 py-3 appearance-none focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all" id="year">
                                        <option value="4">Final Year</option>
                                        <option value="3">Third Year</option>
                                        <option value="2">Second Year</option>
                                    </select>
                                </div>
                                <!-- Division -->
                                <div class="space-y-2">
                                    <label class="text-sm font-semibold text-indigo-900/70 ml-1">Division</label>
                                    <select class="w-full bg-slate-100 border-none rounded-md px-4 py-3 appearance-none focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all" id="division">
                                        <option value="A">A</option>
                                        <option value="B">B</option>
                                        <option value="C">C</option>
                                    </select>
                                </div>
                            </div>
                            <!-- Exam Type -->
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-indigo-900/70 ml-1">Exam Types</label>
                                <div class="flex flex-wrap gap-2">
                                    <label class="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full cursor-pointer hover:bg-white transition-all">
                                        <input type="checkbox" checked value="theory" class="rounded-full text-primary focus:ring-primary"/>
                                        <span class="text-sm font-medium">Theory</span>
                                    </label>
                                    <label class="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full cursor-pointer hover:bg-white transition-all">
                                        <input type="checkbox" value="practical" class="rounded-full text-primary focus:ring-primary"/>
                                        <span class="text-sm font-medium">Practical</span>
                                    </label>
                                </div>
                            </div>
                            <!-- Date Range -->
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-indigo-900/70 ml-1">Date Range</label>
                                <div class="flex items-center gap-3 bg-slate-100 px-4 py-3 rounded-md">
                                    <span class="material-symbols-outlined text-primary text-xl">calendar_month</span>
                                    <input type="text" id="dateRange" class="bg-transparent border-none p-0 focus:ring-0 text-sm font-medium w-full" placeholder="Ex: Oct 12 - Oct 28, 2024"/>
                                </div>
                            </div>
                        </div>
                        <button class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-secondary text-white font-bold text-lg shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3 group" type="submit">
                            <span>Trigger Generation</span>
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">auto_awesome</span>
                        </button>
                    </form>
                </div>

                <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-3xl"></div>

                <div id="errorCard" class="hidden max-w-3xl bg-red-50 border border-red-200 text-red-800 rounded-xl p-5 shadow-sm">
                    <div class="flex justify-between items-start gap-4">
                        <div>
                            <h3 class="font-headline font-bold text-lg mb-1">Generation failed</h3>
                            <p id="errorMessage" class="text-sm mb-3"></p>
                            <ul id="missingList" class="text-sm list-disc list-inside space-y-1"></ul>
                        </div>
                        <button id="gotoAdmin" type="button" class="shrink-0 px-4 py-2 bg-red-600 text-white rounded-full text-sm font-semibold hover:bg-red-700 transition-colors">Go to Admin Panel to Fix</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress Overlay (Hidden initially) -->
        <div id="progressOverlay" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex flex-col items-center justify-center text-white">
            <div class="w-16 h-16 border-4 border-white/20 border-t-white rounded-full animate-spin mb-6"></div>
            <h2 class="font-headline text-3xl font-bold mb-2">Analyzing Constraints</h2>
            <p class="text-white/60 font-medium">Evolutionary algorithm calculating optimal paths...</p>
        </div>
    </main>

    <script>
        const schedulesUrl = "{{ url_for('schedules') }}";
        const adminUrl = "{{ url_for('admin') }}";
        const resultsContainer = document.getElementById('results');
        const errorCard = document.getElementById('errorCard');
        const errorMessage = document.getElementById('errorMessage');
        const missingList = document.getElementById('missingList');
        const gotoAdmin = document.getElementById('gotoAdmin');
        let lastFormData = null;

        function showToast(text, variant = 'success') {
            const colors = {
                success: 'bg-emerald-600',
                error: 'bg-red-600',
                warn: 'bg-amber-500'
            };
            const toast = document.createElement('div');
            toast.className = `fixed top-6 right-6 z-50 px-4 py-3 rounded-lg shadow-lg text-sm font-semibold text-white ${colors[variant] || colors.success}`;
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        function renderOptions(options, warning) {
            resultsContainer.innerHTML = '';
            options.forEach((schedule, index) => {
                const card = document.createElement('div');
                card.className = "bg-white border rounded-lg p-4 shadow-sm";
                card.innerHTML = `
                    <h3 class="font-headline font-bold mb-2">Option ${index + 1}</h3>
                    <pre class="bg-slate-50 p-3 rounded text-xs overflow-auto max-h-48">${JSON.stringify(schedule, null, 2)}</pre>
                    <button class="mt-3 text-sm font-semibold text-primary underline" onclick="selectSchedule(${index + 1})">Select</button>
                `;
                resultsContainer.appendChild(card);
            });
            if (warning) {
                const warn = document.createElement('div');
                warn.className = "col-span-full bg-amber-50 text-amber-800 border border-amber-200 rounded-lg p-3 text-sm";
                warn.textContent = warning;
                resultsContainer.appendChild(warn);
            }
        }

        async function selectSchedule(optionNo) {
            localStorage.setItem('selectedOption', optionNo);
            window.location.href = schedulesUrl;
        }

        function showError(details, canAutoFix = false) {
            errorCard.classList.remove('hidden');
            errorMessage.textContent = details.message || 'Generation failed. Missing data required to build schedules.';
            missingList.innerHTML = '';
            if (Array.isArray(details.missing) && details.missing.length) {
                details.missing.forEach(id => {
                    const li = document.createElement('li');
                    li.textContent = `Subject ID ${id} is missing faculty/class/student mapping`;
                    missingList.appendChild(li);
                });
            }
            showToast('Generation failed. Please fix mappings.', 'error');
            if (canAutoFix) {
                gotoAdmin.textContent = "Auto-Fix Missing Data";
                gotoAdmin.dataset.mode = "auto";
            } else {
                gotoAdmin.textContent = "Go to Admin Panel to Fix";
                gotoAdmin.dataset.mode = "admin";
            }
        }

        async function runGeneration(autoFix = false) {
            document.getElementById('progressOverlay').classList.remove('hidden');
            errorCard.classList.add('hidden');

            const formData = lastFormData || {
                department: document.getElementById('department').value,
                year: document.getElementById('year').value,
                division: document.getElementById('division').value,
                examTypes: Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(c => c.value),
                dateRange: document.getElementById('dateRange').value
            };
            lastFormData = formData;
            formData.auto_fix = autoFix;

            try {
                const res = await fetch('/generate_api', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                const data = await res.json();
                if (!data.success) {
                    const missing = data.message && data.message.match(/\d+/g);
                    throw { message: data.message || 'Generation failed', missing };
                }
                renderOptions(data.options || [], data.warning);
                localStorage.setItem('gaOptions', JSON.stringify(data.options || []));
                if (data.warning) {
                    showToast(data.warning, 'warn');
                } else {
                    showToast('Generated 3 schedule options', 'success');
                }
                setTimeout(() => { window.location.href = schedulesUrl; }, 800);
            } catch (error) {
                console.error("Error triggering generation:", error);
                document.getElementById('progressOverlay').classList.add('hidden');
                showError({
                    message: error.message || 'Generation failed. Missing mappings or data.',
                    missing: error.missing
                }, true);
            }
        }

        document.getElementById('generateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            runGeneration(false);
        });

        gotoAdmin.addEventListener('click', () => {
            if (gotoAdmin.dataset.mode === 'auto') {
                runGeneration(true);
            } else {
                window.location.href = adminUrl;
            }
        });
    </script>
</body>
</html>
